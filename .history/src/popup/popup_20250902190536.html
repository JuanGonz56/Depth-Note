<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depth Annotations</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🎭</span>
        <span class="logo-text">Depth Annotations</span>
      </div>
      <div class="version">v1.0</div>
    </div>
    
    <!-- Stats Section -->
    <div class="stats-section">
      <div class="stat-item">
        <span class="stat-number" id="annotation-count">0</span>
        <span class="stat-label">Annotations</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="page-visits">0</span>
        <span class="stat-label">Pages</span>
      </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="actions-section">
      <button class="action-btn primary" id="toggle-tool">
        <span class="btn-icon">📝</span>
        <span class="btn-text">Start Annotating</span>
      </button>
      
      <div class="action-row">
        <button class="action-btn secondary" id="export-annotations">
          <span class="btn-icon">📤</span>
          Export
        </button>
        <button class="action-btn secondary" id="import-annotations">
          <span class="btn-icon">📥</span>
          Import
        </button>
      </div>
    </div>
    
    <!-- Recent Annotations -->
    <div class="recent-section">
      <h3 class="section-title">Recent Annotations</h3>
      <div class="recent-list" id="recent-annotations">
        <div class="empty-state">
          <span class="empty-icon">📝</span>
          <p>No annotations yet. Click "Start Annotating" to begin!</p>
        </div>
      </div>
    </div>
    
    <!-- Settings -->
    <div class="settings-section">
      <h3 class="section-title">Settings</h3>
      
      <div class="setting-item">
        <label class="setting-label">
          <input type="checkbox" id="auto-save" checked>
          <span class="checkmark"></span>
          Auto-save annotations
        </label>
      </div>
      
      <div class="setting-item">
        <label class="setting-label">
          <input type="checkbox" id="show-depth-indicator" checked>
          <span class="checkmark"></span>
          Show depth indicators
        </label>
      </div>
      
      <div class="setting-item">
        <label class="setting-label">Default depth layer:</label>
        <select id="default-depth" class="setting-select">
          <option value="0">Layer 1</option>
          <option value="1">Layer 2</option>
          <option value="2">Layer 3</option>
          <option value="3">Layer 4</option>
          <option value="4">Layer 5</option>
        </select>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <p>Made for immersive web annotation experiences</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
